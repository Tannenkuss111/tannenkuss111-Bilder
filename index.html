<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tannenkuss111 – Galerie</title>

  <!-- Google Font: Allura (Schreibschrift) -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <img src="tkus111.jpg" alt="Tannenkuss111 Logo" class="logo">
    <h1 class="headline">
      Ankommen, wohlfühlen, durchatmen.
    </h1>
  </header>

  <main>
    <!-- Galerie: 3 Spalten -->
    <div class="gallery">
      <img class="g-img" src="bilder/bild1.jpg" alt="Bild 1 Tannenkuss111">
      <img class="g-img" src="bilder/bild2.jpg" alt="Bild 2 Tannenkuss111">
      <img class="g-img" src="bilder/bild3.jpg" alt="Bild 3 Tannenkuss111">
      <img class="g-img" src="bilder/bild4.jpg" alt="Bild 4 Tannenkuss111">
      <img class="g-img" src="bilder/bild5.jpg" alt="Bild 5 Tannenkuss111">
      <img class="g-img" src="bilder/bild6.jpg" alt="Bild 6 Tannenkuss111">
    </div>

    <!-- Button zur Hauptseite -->
    <div class="cta-wrap">
      <a class="btn-primary" href="https://tannenkuss111.de" target="_blank" rel="noopener">
        Zur Hauptseite &nbsp; tannenkuss111.de
      </a>
    </div>
  </main>

  <!-- Lightbox Overlay (Script.js steuert Öffnen/Schließen) -->
  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button class="close" aria-label="Schließen">✕</button>
    <button class="nav left" aria-label="Vorheriges Bild">❮</button>
    <img id="lightbox-img" alt="Großansicht">
    <button class="nav right" aria-label="Nächstes Bild">❯</button>
  </div>

  <!-- Scripts -->
  <script src="script.js"></script>
</body>
</html>
