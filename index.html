<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tannenkuss111 – Galerie</title>

  <!-- Schreibschrift -->
  <link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <img src="tkus111.jpg" class="logo" alt="Tannenkuss111 Logo">
    <h1 class="headline">Ankommen, wohlfühlen, durchatmen.</h1>
  </header>

  <main>

    <div class="gallery">
      <!-- 2 Spalten, große Bilder -->
      <img src="bilder/bild1.jpg" alt="Bild 1" class="g-img">
      <img src="bilder/bild2.jpg" alt="Bild 2" class="g-img">
      <img src="bilder/bild3.jpg" alt="Bild 3" class="g-img">
      <img src="bilder/bild4.jpg" alt="Bild 4" class="g-img">
      <img src="bilder/bild5.jpg" alt="Bild 5" class="g-img">
      <img src="bilder/bild6.jpg" alt="Bild 6" class="g-img">
    </div>

  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button class="close" aria-label="Schließen">✕</button>
    <div class="lb-inner" role="dialog" aria-modal="true" aria-label="Bildanzeige">
      <button class="nav left" aria-label="Vorheriges Bild">❮</button>
      <img id="lightbox-img" alt="Großansicht">
      <button class="nav right" aria-label="Nächstes Bild">❯</button>
    </div>
  </div>

  <!-- Script -->
  <script src="script.js"></script>
</body>
</html>
